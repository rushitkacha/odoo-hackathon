<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AquaSign</title>
  <meta name="description" content="Sign in to your AquaSign account. A premium light blue themed login experience." />

  <!-- Google Fonts: Multiple different fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&family=Raleway:wght@400;600&family=Dancing+Script:wght@700&family=Space+Grotesk:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Floating Bubbles -->
  <div class="bubbles" aria-hidden="true">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <!-- Login Card -->
  <div class="card-wrapper">
    <div class="card" role="main">

      <!-- Logo -->
      <div class="logo-ring" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.686 2 6 5.582 6 10c0 5.25 6 12 6 12s6-6.75 6-12c0-4.418-2.686-8-6-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </svg>
      </div>

      <!-- Titles -->
      <h1 class="card-title">Welcome Back</h1>
      <p class="card-subtitle">Sign in to continue your journey ✨</p>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="field">
          <label class="field-label" for="email">Email Address</label>
          <div class="input-wrap">
            <input
              class="field-input"
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <span class="icon" aria-hidden="true">✉</span>
          </div>
          <span class="error-msg" id="emailError">Please enter a valid email address.</span>
        </div>

        <!-- Password -->
        <div class="field">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              class="field-input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <span class="icon" aria-hidden="true">🔒</span>
            <button
              type="button"
              class="toggle-pass"
              id="togglePass"
              aria-label="Toggle password visibility"
            >👁</button>
          </div>
          <span class="error-msg" id="passwordError">Password must be at least 6 characters.</span>
        </div>

        <!-- Options -->
        <div class="options-row">
          <label class="remember">
            <input type="checkbox" id="rememberMe" />
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button class="btn-login" type="submit" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="spinner" aria-hidden="true">
            <span class="spinner-ring"></span>
          </span>
        </button>

      </form>

      <!-- Success State -->
      <div class="success-overlay" id="successOverlay" aria-live="polite">
        <div class="checkmark">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <p>Login Successful!</p>
        <small>Redirecting you shortly…</small>
      </div>

      <!-- Divider -->
      <div class="divider"><span>or continue with</span></div>

      <!-- Social -->
      <div class="social-row">
        <a href="#" class="social-btn" id="googleBtn" aria-label="Sign in with Google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </a>
        <a href="#" class="social-btn" id="githubBtn" aria-label="Sign in with GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          GitHub
        </a>
      </div>

      <!-- Sign Up -->
      <p class="signup-text">
        Don't have an account? <a href="#" id="signupLink">Create one</a>
      </p>

    </div>
  </div>

  <!-- Scripts -->
  <script src="login.js"></script>

</body>
</html>
